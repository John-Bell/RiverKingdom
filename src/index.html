<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>River Kingdom Logic Runner</title>
    
        <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                let attempts = 0;
                while (typeof window.processSeason !== 'function') {
                    if (attempts > 40) {
                        return JSON.stringify({ error: "CRITICAL: Engine blocked by iPhone security (CORS)." });
                    }
                    await new Promise(resolve => setTimeout(resolve, 50));
                    attempts++;
                }
                
                const parsedData = typeof data === 'string' ? JSON.parse(data) : data;
                const nextTurn = window.processSeason(parsedData.state, parsedData.orders);
                
                return JSON.stringify({ result: nextTurn });
            } catch (e) {
                return JSON.stringify({ error: e.message || e.toString() });
            }
        };
    </script>

</head>
<style>
    body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
    #map-container { 
        background: #e3d5b8; /* Parchment color */
        border: 4px solid #5c4033; 
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        min-height: 200px;
    }
    .stats { font-size: 16px; margin-top: 10px; color: #333; }
</style>
<body>
    <div id="map-container">
        Initializing River Kingdom...
    </div>
    
    <script type="module">
        import { processSeason } from './scripts/engine.ts';
        window.processSeason = processSeason;
    </script>
</body>

</html>
