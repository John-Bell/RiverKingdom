<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="fonts.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Lora', serif;
            background-color: #f3e9d2;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PREVIEW VS FULLSCREEN LOGIC --- */
        
        /* Hide top section by default (for chat bubble preview) */
        .top-section {
            display: none;
            padding: 15px 20px;
            background: #f3e9d2;
            border-bottom: 2px solid #d0c0a0;
        }

        /* Show top section only in Full Screen (height threshold) */
        @media (min-height: 600px) {
            .top-section { display: block; }
            .map-area { height: 65%; }
        }

        .map-area { flex: 1; display: flex; position: relative; overflow: hidden; }
        
        /* Ensure the map fills the whole bubble in preview */
        @media (max-height: 599px) {
            .map-area { height: 100vh; width: 100vw; }
        }

        /* --- UI COMPONENTS --- */
        .year-season { font-family: 'Cinzel', serif; font-size: 20px; text-align: center; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; }
        .stat-label { font-family: 'Cinzel', serif; font-size: 11px; color: #555; }
        .stat-val { font-size: 24px; font-weight: bold; }

        .left-panel, .right-panel { width: 50%; height: 100%; position: relative; }
        .village-img { transform: scale(1.8) translate(15%, -15%); width: 100%; }
        .mountain-img { width: 160%; position: absolute; right: -25%; bottom: -35%; }

        /* --- ANIMATIONS (Non-infinite for timeline sync) --- */
        .thief-sprite {
            position: absolute; width: 30px; height: 50px;
            background-image: url('thief.png'); background-size: 500% 100%;
            bottom: var(--start-y); right: var(--start-x);
        }

        /* Walk cycle stays infinite, but movement happens once 'forwards' */
        .thief-1 { --start-y: 400px; --start-x: 90px; animation: walk-cycle 0.6s steps(4) infinite, raid-village-1 5s linear forwards; }
        .thief-2 { --start-y: 350px; --start-x: 60px; animation: walk-cycle 0.5s steps(4) infinite, raid-village-2 4s linear forwards; }

        @keyframes walk-cycle { 0% { background-position: 0 0; } 100% { background-position: 100% 0; } }
        @keyframes raid-village-1 { 0% { transform: translate(0,0) scaleX(-1); } 100% { transform: translate(-100px, 20px) scaleX(-1); } }
        @keyframes raid-village-2 { 0% { transform: translate(0,0) scaleX(-1); } 100% { transform: translate(-80px, 40px) scaleX(-1); } }

        #floodCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; mix-blend-mode: multiply; }
    </style>
</head>
<body>
    <div class="top-section">
        <div class="year-season">YEAR: <span id="year-val">-</span> | SEASON: <span id="season-val">-</span></div>
        <div class="stats-row">
            <div class="stat-col"><div class="stat-label">VILLAGERS</div><div class="stat-val" id="villagers-val">-</div></div>
            <div class="stat-col"><div class="stat-label">GRANARY</div><div class="stat-val" id="granary-val">-</div></div>
        </div>
    </div>

    <div class="map-area">
        <canvas id="floodCanvas"></canvas>
        <div class="left-panel"><img src="river-land.png" style="width:100%; height:100%; object-fit:cover;"></div>
        <div class="right-panel">
            <img src="Village.png" class="village-img">
            <img src="Mountain.png" class="mountain-img">
            <div id="thieves-container" style="display: none;">
                <div class="thief-sprite thief-1"></div>
                <div class="thief-sprite thief-2"></div>
            </div>
        </div>
    </div>

    <script>
        let canvas, ctx, particles = [], floodIntensity = 0;

        function updateUI(state) {
            document.getElementById('year-val').innerText = state.year;
            document.getElementById('season-val').innerText = state.season;
            document.getElementById('villagers-val').innerText = state.population;
            document.getElementById('granary-val').innerText = state.storedRice || 0;
        }

        function initApp() {
            canvas = document.getElementById('floodCanvas');
            ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;

            const urlParams = new URLSearchParams(window.location.search);
            const state = JSON.parse(decodeURIComponent(urlParams.get('state') || '{}'));
            const anim = urlParams.get('anim');
            const intensity = urlParams.get('intensity');

            updateUI(state);

            // Trigger animations ONLY if in the small chat bubble (Preview Mode)
            const isPreview = window.innerHeight < 600;
            if (isPreview) {
                if (anim === 'raid') {
                    document.getElementById('thieves-container').style.display = 'block';
                }
                if (anim === 'flood') {
                    floodIntensity = parseInt(intensity) || 2;
                    animateFlood();
                }
            }
        }

        // Simplified flood loop for preview performance
        function animateFlood() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(52, 136, 188, 0.6)";
            ctx.beginPath();
            ctx.arc(canvas.width * 0.3, canvas.height * 0.4, 50 * floodIntensity, 0, Math.PI * 2);
            ctx.fill();
            if (floodIntensity > 0) requestAnimationFrame(animateFlood);
        }

        window.onload = initApp;
    </script>
</body>
</html>
