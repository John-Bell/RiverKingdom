<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Agent Skill Simulator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #eee;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            flex: 1;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            margin-bottom: 10px;
        }

        button {
            background: #001d32;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* The exact aspect ratio box the app provides */
        .phone-screen {
            width: 100%;
            aspect-ratio: 1.333;
            border: 4px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="panel">
        <h2>1. Fake the LLM Input</h2>
        <textarea id="mock-llm-data">
{
  "state": { "year": 1, "season": 1, "population": 100, "storedRice": 5000, "plantedRice": 0 },
  "orders": { "dykeWorkers": 0, "fieldWorkers": 20, "villageGuards": 0, "riceToPlant": 1000 }
}
        </textarea>
        <button onclick="simulateTurn()">Run Turn &rarr;</button>

        <h3 style="margin-top:20px;">2. Hidden Engine Output</h3>
        <div id="vizier-response" style="background:#f4f4f9; padding: 10px; border-radius: 4px; font-style: italic;">
            Awaiting orders...</div>
    </div>

    <div class="panel" style="flex: 1.5;">
        <h2>3. The App Webview</h2>
        <div class="phone-screen">
            <iframe id="app-webview" src="assets/webview.html"></iframe>
        </div>
    </div>

    <script src="scripts/rules.js"></script>

    <script src="scripts/engine.js"></script>

    <script>
        async function simulateTurn() {
            const rawData = document.getElementById('mock-llm-data').value;

            // 1. Run the turn
            const responseString = await window['ai_edge_gallery_get_result'](rawData);
            const response = JSON.parse(responseString);

            if (response.error) {
                document.getElementById('vizier-response').innerText = "ERROR: " + response.error;
                return;
            }

            // 2. Show the Vizier's text
            document.getElementById('vizier-response').innerText = response.result;

            // 3. Update the Map
            if (response.webview && response.webview.url) {
                document.getElementById('app-webview').src = "assets/" + response.webview.url;
            }

            // 4. THE LLM SIMULATOR MAGIC: 
            // We parse the current state from the text area, update it by running the engine math again 
            // (since the simulator doesn't have the LLM's memory), and write it back to the box!
            const oldData = JSON.parse(rawData);
            const nextTurnMath = processSeason(oldData.state, oldData.orders); // Borrowing your engine function directly

            const nextPayload = {
                state: nextTurnMath.state,
                orders: { dykeWorkers: 0, fieldWorkers: 0, villageGuards: 0, riceToPlant: 0 } // Reset orders for the user
            };

            // Overwrite the text box so the next click advances the game!
            document.getElementById('mock-llm-data').value = JSON.stringify(nextPayload, null, 2);
        }
    </script>
</body>

</html>
